name: Sincronizar hacia GitLab

on:
  push:
    branches:
      - main # Cambia a 'master' si es el caso

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Trae todo el historial para comparar hashes

      - name: Verificar y Pushear a GitLab
        run: |
          # Agregar el remoto de GitLab usando el Token de acceso
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/diego.rg/redes-de-computadores.git
          git fetch gitlab main

          # Obtener los hashes del último commit en ambos lados
          GITHUB_COMMIT=$(git rev-parse HEAD)
          GITLAB_COMMIT=$(git rev-parse gitlab/main)

          if [ "$GITHUB_COMMIT" = "$GITLAB_COMMIT" ]; then
            echo "Ambos repositorios ya están idénticos. Sincronización cancelada para evitar bucles."
          else
            echo "Detectados cambios nuevos en GitHub. Sincronizando GitLab..."
            git push gitlab main
          fi
